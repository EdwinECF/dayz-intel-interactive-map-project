<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map - DZ-Atlas</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/map.css">
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/responsive.css">
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
</head>
<body>
  <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <img src="../assets/logos/mainlogo.png" alt="DZ-Atlas Logo" class="logo-image">
                <h2>DZ-Atlas</h2>
            </div>
            <nav class="nav-links">
                <ul>
                    <li><a href="../index.html">
                        <i class="fa-solid fa-house"></i>
                        DASHBOARD
                    </a></li>
                    <li><a href="map.html">
                        <i class="fa-solid fa-map"></i>
                        MAP
                    </a></li>
                    <li><a href="guides.html">
                        <i class="fa-solid fa-book-atlas"></i>
                        GUIDES
                    </a></li>
                    <li><a href="gear.html">
                        <i class="fa-solid fa-shield-alt"></i>
                        GEAR
                    </a></li>
                    <li><a href="weapons.html">
                        <i class="fa-solid fa-gun"></i>
                        WEAPONS
                    </a></li>
                    <li><a href="vehicles.html">
                        <i class="fa-solid fa-car"></i>
                        VEHICLES
                    </a></li>
                    <li><a href="loot.html">
                        <i class="fa-solid fa-tent"></i>
                        LOOT
                    </a></li>
                    <li><a href="crafting.html">
                        <i class="fa-solid fa-hammer"></i>
                        CRAFTING
                    </a></li>
                    <li><a href="survival.html">
                        <i class="fa-solid fa-briefcase-medical"></i>
                        SURVIVAL
                    </a></li>
                    <li><a href="factions.html">
                        <i class="fa-solid fa-users"></i>
                        FACTIONS
                    </a></li>
                    <li><a href="news.html">
                        <i class="fa-solid fa-newspaper"></i>
                        NEWS
                    </a></li>
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <header class="header">
                <h1>Map</h1>
            </header>
            <section class="content map-page">
                <section class="map-toolbar">
                    <input type="text" placeholder="Search location...">

                    <div class="map-filters">
                        <button>Military</button>
                        <button>Medical</button>
                        <button>Water</button>
                        <button>Vehicles</button>
                        <button>Towns</button>
                    </div>
                </section>

                <section class="map-layout">
                    <div class="map-container">
                        <div id="dayz-map"></div>

                        <div class="coordinate-tooltip" id="coordinate-tooltip">
                            X: 0 | Y: 0
                        </div>

                        <div id="map-crosshair">
                            <i class="fa-solid fa-crosshairs"></i>
                        </div>
                    </div>
                </section>

                <aside class="info-panel">
                  Location information
                </aside>

                <div class="map-placeholder">
                    <h3>Location Info</h3>
                    <p>Select a marker to view location details.</p>
                </div>

            </section>
        </main>
  </div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../js/map.js"></script>
</body>
</html>
